format = "$directory$git_branch$git_status$character"

[directory]
style = ""
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = " $branch"
symbol = ""
style = ""

[git_status]
format = '$all_status$ahead_behind'
style = ""

[character]
success_symbol = "❯"
error_symbol = "❯"

[line_break]
disabled = true
