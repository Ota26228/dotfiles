"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](fg:#adc6ff)\
[ у∞£З  ](bg:#adc6ff fg:#002e69)\
[оВі](bg:#b1c6f7 fg:#adc6ff)\
$directory\
[оВі](fg:#b1c6f7 bg:#b1c6f7)\
$git_branch\
$git_status\
[оВі](fg:#b1c6f7 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#11131a bg:#0b0e15)\
$time\
[оВі ](fg:#0b0e15)\
\n$character"""

[directory]
style = "fg:#193057 bg:#b1c6f7"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#193057"
format = '[[ $symbol $branch ](fg:#193057 bg:#b1c6f7)]($style)'

[git_status]
style = "bg:#193057"
format = '[[($all_status$ahead_behind )](fg:#193057 bg:#b1c6f7)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#11131a"
format = '[[ $symbol ($version) ](fg:#e1e2eb bg:#11131a)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#0b0e15"
format = '[[ пРЇ $time ](fg:#ffdad6 bg:#0b0e15)]($style)'
