
#################################
#             全般設定           #
#################################
# バックエンドをGLX（OpenGL）に設定（ぼかしや影を滑らかにするため必須）
backend = "glx";
vsync = true;

#################################
#             影 (Shadow)        #
#################################
shadow = true;
shadow-radius = 12;      # 影の広がり
shadow-offset-x = -12;   # 影の水平位置
shadow-offset-y = -12;   # 影の垂直位置
shadow-opacity = 0.7;    # 影の濃さ

# 影をつけないウィンドウ（パネルや通知など）
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           透過 (Opacity)       #
#################################
active-opacity = 1.0;            # アクティブ時は不透明
inactive-opacity = 0.85;         # 非アクティブ時は少し透かす
frame-opacity = 0.7;             # タイル枠の透明度
inactive-dim = 0.1;              # 非アクティブ時を少し暗くする
focus-exclude = [ "class_g = 'Cairo-clock'" ];

# 特定のアプリのみ透過度を固定（ターミナルなど）
opacity-rule = [
    "95:class_g = 'Alacritty' && !focused",
    "100:class_g = 'Firefox'",
    "100:class_g = 'Chromium'"
];

#################################
#           ぼかし (Blur)        #
#################################
# すりガラス効果。PC負荷が高い場合は blur-method = "none" に。
blur-method = "dual_kawase";
blur-strength = 5;               # ぼかしの強さ
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           フェード (Fading)    #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;                  # アニメーションの速さ（小さいほど滑らか）

#################################
#           角丸 (Corners)       #
#################################
corner-radius = 10;              # ウィンドウの角を丸くする
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
