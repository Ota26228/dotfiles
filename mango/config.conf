# Mango config - https://github.com/mangowm/mango/wiki/
# ─── Visual Effects ───────────────────────────────────────────────────────────
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes=3
blur_params_radius=6
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=1
layer_shadows=1
shadow_only_floating=0
shadows_size=10
shadows_blur=20
shadows_position_x=0
shadows_position_y=4
shadowscolor=0x00000066

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.88

animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=300
animation_duration_open=350
animation_duration_tag=300
animation_duration_close=600
animation_duration_focus=150
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ─── Layout ───────────────────────────────────────────────────────────────────
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0
circle_layout=tile,scroller,deck

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile

# ─── Appearance ───────────────────────────────────────────────────────────────
gappih=5
gappiv=5
gappoh=10
gappov=10
borderpx=2
rootcolor=0x11131aff
bordercolor=0x2a2d36ff
focuscolor=0x7aa2f7ff
urgentcolor=0xffb4abff
scratchpadcolor=0x516c93ff

# ─── Keyboard ─────────────────────────────────────────────────────────────────
repeat_rate=35
repeat_delay=250
xkb_rules_layout=us
xkb_rules_options=ctrl:nocaps

# ─── Touchpad ─────────────────────────────────────────────────────────────────
tap_to_click=1
tap_and_drag=1
trackpad_natural_scrolling=1
disable_while_typing=1

# ─── Environment (fcitx5) ─────────────────────────────────────────────────────
env=GTK_IM_MODULE=fcitx
env=QT_IM_MODULE=fcitx
env=XMODIFIERS=@im=fcitx

# ─── Autostart ────────────────────────────────────────────────────────────────
exec-once=swaybg -i ~/Wallpapers/wp6942095-polyphia-wallpapers.jpg -m fill
exec-once=waybar
exec-once=mako
exec-once=fcitx5 -d --replace
exec-once=mpris-proxy
exec-once=systemctl --user start polkit-kde-agent.service
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mango GTK_IM_MODULE QT_IM_MODULE XMODIFIERS
exec-once=systemctl --user start mpd mpd-mpris

# ─── Misc ─────────────────────────────────────────────────────────────────────
sloppyfocus=1
warpcursor=1
focus_on_activate=1
drag_tile_to_tile=1
cursor_size=24

# ─── Keybindings ──────────────────────────────────────────────────────────────

# Config reload
bind=SUPER+SHIFT,r,reload_config

# Applications
bind=SUPER,Return,spawn,kitty
bind=SUPER,p,spawn,waypaper
bind=SUPER,w,spawn, zen-beta
bind=SUPER,e,spawn,kitty -e yazi
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,Tab,spawn,rofi -show window
bind=SUPER,x,spawn,swaylock
bind=SUPER,c,spawn,sh -c 'hyprpicker | wl-copy'

# Window management
bind=SUPER,q,killclient,
bind=SUPER,f,togglefullscreen,
bind=SUPER+ALT,space,togglefloating,
bind=SUPER,space,togglefloating,
bind=SUPER,m,switch_layout
bind=ALT,Tab,focusstack,next
bind=ALT+SHIFT,Tab,focusstack,prev

# Focus (hjkl)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up

# Move windows (hjkl)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up

# Swap with master (dwl zoom)
bind=SUPER+SHIFT,Return,zoom,

# Master count
bind=SUPER,i,incnmaster,1
bind=SUPER+SHIFT,i,incnmaster,-1

# Monitor focus / move to monitor
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+SHIFT,comma,tagmon,left
bind=SUPER+SHIFT,period,tagmon,right

# Tags (1-5)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0

# Screenshot
bind=SUPER+SHIFT,s,spawn,sh -c 'grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png | wl-copy && notify-send Screenshot "Saved & Copied" -i camera-photo'

# Screen recording (toggle: same key starts / stops)
bind=SUPER,r,spawn,/home/ota2525/dotfiles/mango/record-toggle.sh

# btop
bind=CTRL+SHIFT,Escape,spawn,kitty --class btop -e btop

# Volume
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit=1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind=SUPER+ALT,j,spawn,brightnessctl s 5%+
bind=SUPER+ALT,k,spawn,brightnessctl s 5%-

# ─── Window Rules ─────────────────────────────────────────────────────────────
windowrule=appid:update-term,isfloating:1,width:900,height:600
windowrule=appid:float-term,isfloating:1,width:900,height:800
windowrule=appid:nmtui-term,isfloating:1
windowrule=appid:quick-ask-input,isfloating:1,width:900,height:500
windowrule=appid:calendar-tui,isfloating:1,width:900,height:600

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER,btn_middle,togglefloating,

# ─── Layer Rules ──────────────────────────────────────────────────────────────
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
